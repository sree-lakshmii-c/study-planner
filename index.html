<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Study Planner</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-doodles">
    <img class="doodle d1" src="https://cdn-icons-png.flaticon.com/512/29/29302.png">
    <img class="doodle d2" src="https://cdn-icons-png.flaticon.com/512/3135/3135768.png">
    <img class="doodle d3" src="https://cdn-icons-png.flaticon.com/512/167/167707.png">
    <img class="doodle d4" src="https://cdn-icons-png.flaticon.com/512/1828/1828911.png">
    <img class="doodle d5" src="https://cdn-icons-png.flaticon.com/512/1995/1995574.png">
</div>

    <div class="container">
        <h1>📚 Smart Study Planner</h1>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Enter your study task">

            <select id="subject">
                <option value="Maths">Maths</option>
                <option value="Physics">Physics</option>
                <option value="Chemistry">Chemistry</option>
                <option value="Programming">Programming</option>
            </select>

            <input type="date" id="deadline">

            <button onclick="addTask()">Add Task</button>
        </div>

        <ul id="taskList"></ul>
    </div>

    <script src="script.js"></script>

</body>
</html>
